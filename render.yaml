services:
  - type: web
    name: shared-expenses-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    disk:
      name: sqlite-storage
      mountPath: /data
      sizeGB: 1
